# Load test:
# autocannon --renderStatusCodes -c 250 -d 60 --workers 4 https://localhost
# config for 1M request per minute (may exceed OS connections limit): 
# autocannon --renderStatusCodes -c 500 -d 60 --connections 1000 --workers 4 https://localhost 

# Logs
# access logs
# tail -f /usr/local/var/log/nginx/access.log
# error logs
# tail -f /usr/local/var/log/nginx/error.log

events {
    worker_connections  4096; # 1024 -> 4096 for heavy load testing
}

http {
    # Optimized upstream settings for production
    upstream http_backend {
        least_conn;
        server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:4000 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:5000 max_fails=3 fail_timeout=10s;
    }

    upstream socket_backend {
        ip_hash;
        server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:4000 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:5000 max_fails=3 fail_timeout=10s;
    }

    # Map block to dynamically handle WebSocket protocol upgrade headers
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP to HTTPS Redirect
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS Server
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate "/Users/rahmidha/Documents/2026 Practice/localhost.crt";
        ssl_certificate_key "/Users/rahmidha/Documents/2026 Practice/localhost.key";

        # Production SSL Hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Standard API/Static Content Traffic
        location / {
            proxy_pass http://http_backend;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Network timeouts for standard HTTP API calls
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # WebSocket Traffic
        location /socket {
            proxy_pass http://socket_backend;

            # Production-grade Dynamic WebSocket Upgrade
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Headers for client tracking
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Keep persistent tunnel open without proxy drops (24 Hours)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            
            # Disable buffering for real-time stream delivery
            proxy_buffering off;
        }

        # Gzip Compression
        gzip on;
        gzip_types
            text/plain
            application/json
            text/css
            application/javascript;
        gzip_min_length 1000;
    }
}
