apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: your-dockerhub/ai-service
          ports:
            - containerPort: 8000
      volumeMounts:
        - name: vector-storage
          mountPath: /app/vector_db

      volumes:
        - name: vector-storage
          persistentVolumeClaim:
            claimName: vector-pvc
      resources:
        requests:
          memory: "1Gi"
          cpu: "500m"
        limits:
          memory: "2Gi"
          cpu: "1000m"