apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: gateway

  template:
    metadata:
      labels:
        app: gateway

    spec:
      containers:
        - name: gateway
          image: api-gateway:latest
          imagePullPolicy: Never 
          env:
            - name: AUTH_SERVICE_URL
              value: http://auth-service:3001

            - name: JOURNAL_SERVICE_URL
              value: http://journal-service:3002
          ports:
            - containerPort: 3000