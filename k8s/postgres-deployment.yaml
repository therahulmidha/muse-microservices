apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15 # Specific versions are better than 'latest'
          env:
            - name: POSTGRES_PASSWORD
              value: "admin" # REQUIRED: Postgres won't start without this
            - name: POSTGRES_USER
              value: "admin"
            - name: POSTGRES_DB
              value: "authdb"      # Optional: Creates this DB on startup
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          hostPath:
            path: /tmp/postgres-data-new # Saves data to your actual computer