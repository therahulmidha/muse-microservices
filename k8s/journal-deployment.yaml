apiVersion: apps/v1
kind: Deployment
metadata:
  name: journal-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: journal

  template:
    metadata:
      labels:
        app: journal

    spec:
      containers:
        - name: journal
          image: journal-service:latest
          imagePullPolicy: Never 
          env:
            - name: DATABASE_URL
              value: mongodb://mongo:27018/journaldb

            - name: REDIS_URL
              value: redis://redis:6380

            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5673
          ports:
            - containerPort: 3002